<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FoodHub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#fff7ed,#ffedd5,#fde68a);
            padding:20px;
        }
        .container{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:20px;
            padding:35px 30px;
            box-shadow:0 20px 45px rgba(0,0,0,0.12);
        }
        h1{
            text-align:center;
            color:#ea580c;
            margin-bottom:8px;
        }
        p{
            text-align:center;
            color:#64748b;
            margin-bottom:20px;
        }
        .alert{
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
            font-size:14px;
        }
        .error{background:#fee2e2;color:#b91c1c;}
        .success{background:#dcfce7;color:#166534;}
        .form-group{margin-bottom:16px;}
        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#334155;
        }
        input{
            width:100%;
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:12px;
            outline:none;
        }
        input:focus{
            border-color:#f97316;
            box-shadow:0 0 0 4px rgba(249,115,22,0.15);
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#f97316,#ea580c);
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
        }
        .bottom-text{
            text-align:center;
            margin-top:18px;
            color:#64748b;
        }
        .bottom-text a{
            color:#ea580c;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FoodHub</h1>
        <p>Login to continue</p>

        <div th:if="${param.error}" class="alert error">Invalid username or password</div>
        <div th:if="${param.logout}" class="alert success">Logged out successfully</div>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="bottom-text">
            Don’t have an account? <a th:href="@{/signup}">Sign Up</a>
        </div>
    </div>
</body>
</html>
