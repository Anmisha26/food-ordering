<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | FoodHub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff7ed, #ffedd5, #fde68a);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 20px;
      padding: 35px 30px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      color: #ea580c;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      color: #64748b;
      margin-bottom: 20px;
    }

    .message {
      display: none;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
      background: #fee2e2;
      color: #b91c1c;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .bottom-text {
      text-align: center;
      margin-top: 18px;
      color: #64748b;
    }

    .bottom-text a {
      color: #ea580c;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Create Account</h1>
    <p>Sign up for FoodHub</p>

    <div id="errorMsg" class="message">Please fill all fields</div>

    <form id="signupForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter full name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create password" />
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="bottom-text">
      Already have an account? <a href="/index.html">Login</a>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      if (fullName === "" || email === "" || username === "" || password === "") {
        errorMsg.style.display = "block";
        return;
      }

      alert("Account created successfully");
      window.location.href = "/index.html";
    });
  </script>
</body>
</html>
